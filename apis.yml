- aid: helsing:sg-1-fathom
  name: Helsing SG-1 Fathom
  description: SG-1 Fathom is Helsing's long-endurance underwater drone, capable of operating submerged for up to 90 days
    and running Lura's acoustic-processing AI on board.
  humanURL: https://helsing.ai
