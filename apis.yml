aid: helsing
name: Helsing
description: Helsing SE is a Munich-based European defense AI company founded in March 2021 by Torsten Reil, Gundbert Scherf,
  and Niklas Köhler. Helsing builds AI software and autonomous weapons systems for European and allied militaries — reconnaissance-strike
  software (Altra), electronic-warfare AI (Cirra), an AI fighter pilot (Centaur), loitering-munition strike drones (HF-1
  and HX-2), an autonomous combat aircraft (CA-1 Europa), and underwater autonomy (Lura acoustic processing, SG-1 Fathom
  long-endurance underwater drones). The company is sales-led and government-restricted; there is no public REST API or developer
  portal. This profile documents the publicly visible product surfaces and partnerships rather than endpoint shapes. Funding
  totals roughly €1.37B across four rounds, with a $1.2B Series E at an $18B valuation reportedly being finalized as of May
  2026. Daniel Ek's Prima Materia is the largest shareholder. Public partnerships include Saab (Gripen E integration of Centaur,
  including the 2025 Project Beyond combat trial), Airbus, Rheinmetall, the Bundeswehr, and the Eurofighter Typhoon EK programme.
