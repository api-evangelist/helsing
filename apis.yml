apis:
- aid: helsing:altra
  name: Helsing Altra
  description: Altra is Helsing's reconnaissance-strike software platform. It fuses multi-sensor and multi-drone data feeds
    to cover wider areas, identify targets, and coordinate strikes. Altra is the AI layer that runs inside Helsing's drone
    systems (HF-1, HX-2) and that integrates with allied platforms.
  humanURL: https://helsing.ai/altra
  tags:
  - Reconnaissance
  - Strike
  - Multi-Sensor Fusion
  - Software Platform
  properties:
  - type: Documentation
    url: https://helsing.ai/altra
- aid: helsing:centaur
  name: Helsing Centaur
  description: Centaur is Helsing's AI fighter pilot. It can function as an autonomous combat agent on board fighter jets,
    operate independently or as part of a swarm, and integrate with allied airframes. In 2025 Helsing and Saab ran Project
    Beyond — the first publicly known combat trial of AI piloting a fully operational fighter jet, with Centaur flying a
    Gripen E in a beyond-visual-range engagement against a human-operated Gripen D. Centaur also flies on Helsing's own CA-1
    Europa platform.
  humanURL: https://helsing.ai
  tags:
  - AI Fighter Pilot
  - Autonomy
  - Air Combat
  - Saab Gripen
  properties:
  - type: Documentation
    url: https://helsing.ai
- aid: helsing:cirra
  name: Helsing Cirra
  description: Cirra is Helsing's electronic-warfare AI for detecting, classifying, and responding to electromagnetic-spectrum
    threats. It powers Helsing's contribution to programmes such as the Eurofighter Typhoon EK electronic-warfare variant.
  humanURL: https://helsing.ai
  tags:
  - Electronic Warfare
  - EW
  - Signals
  properties:
  - type: Documentation
    url: https://helsing.ai
- aid: helsing:lura
  name: Helsing Lura
  description: Lura is Helsing's underwater AI. It rapidly processes acoustic data to detect and classify ships and submarines
    while emitting significantly less noise than conventional sonar.
  humanURL: https://helsing.ai
  tags:
  - Underwater Autonomy
  - Acoustic Processing
  - Anti-Submarine Warfare
  properties:
  - type: Documentation
    url: https://helsing.ai
- aid: helsing:hf-1
  name: Helsing HF-1
  description: HF-1 is an AI-enabled loitering-munition strike drone. It uses on-board AI and stored map data to navigate
    and target without relying on GPS. HF-1 has been used by the Ukrainian government in its defence against the Russian
    invasion of Ukraine.
  humanURL: https://helsing.ai
  tags:
  - Loitering Munition
  - Strike Drone
  - GPS-Denied
  properties:
  - type: Documentation
    url: https://helsing.ai
- aid: helsing:hx-2
  name: Helsing HX-2
  description: HX-2 is Helsing's next-generation AI strike drone. Like HF-1 it operates without GPS and runs on-board target
    recognition. HX-2 is manufactured at Helsing's factory in southern Germany.
  humanURL: https://helsing.ai/hx-2
  tags:
  - Loitering Munition
  - Strike Drone
  - GPS-Denied
  - Manufacturing
  properties:
  - type: Documentation
    url: https://helsing.ai/hx-2
- aid: helsing:ca-1-europa
  name: Helsing CA-1 Europa
  description: CA-1 Europa is Helsing's autonomous combat aircraft. It flies Centaur as its AI pilot and is targeted for first
    flight in 2027.
  humanURL: https://helsing.ai/europa
  tags:
  - Autonomous Combat Aircraft
